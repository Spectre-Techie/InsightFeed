services:
  - type: web
    name: insightfeed-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pnpm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: NEWSAPI_API_KEY
        sync: false
      - key: MEDIASTACK_API_KEY
        sync: false
